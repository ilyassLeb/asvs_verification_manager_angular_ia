@if (category) {

<section class="section-container requirements-area">

  <div class="section-header">
    <h2>
      {{ category.name }}
      <small>({{ category.requirements.length }} Requirements)</small>
    </h2>
  </div>

  <div class="requirements-list">

    @for (req of category.requirements; track req.id) {

      <app-requirement-card
        [requirement]="req"
        (review)="requirementSelected.emit($event)">
      </app-requirement-card>

    }

  </div>

</section>

}
